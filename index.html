<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Painel de Controle - Atividade Prática</title>
    <link rel="stylesheet" href="src/styles/style.css" />
  </head>
  <body>
    <div class="container">
      <aside class="menu-lateral">
        <h2>Menu</h2>
        <ul>
          <li><a href="#">Dashboard</a></li>
          <li><a href="#">Relatórios</a></li>
          <li><a href="#">Configurações</a></li>
          <li><a href="#">Perfil</a></li>
        </ul>
      </aside>

      <header class="cabecalho">
        <h1>Painel Administrativo</h1>
        <button class="btn-animate">Ação Principal</button>
      </header>

      <main class="principal">
        <div class="content-box">
          <h3>Card 1</h3>
          <p>Informações de desempenho da aplicação.</p>
        </div>
        <div class="content-box">
          <h3>Card 2</h3>
          <p>Estatísticas de usuários ativos hoje.</p>
        </div>
        <div class="content-box">
          <h3>Card 3</h3>
          <p>Alertas de sistema e notificações.</p>
        </div>
      </main>
    </div>
  </body>
</html>
